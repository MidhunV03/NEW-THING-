    <div class="container mt-5">
        <h1 class="mb-4">STUDENT DASHBOARD</h1>

                <div class="card card-custom rounded-2 position-relative ">
                    <img src="/assets/learning.png" alt="" class="position-absolute top-0 start-100 theme-icon-cap" width="50px" style="transform: translate(-50%,-50%) rotate(40deg);">

                    </div> -->
                    <div class="card-body d-flex flex-column gap-3">

                            <div id="studentDetailsCointainer">
                            </div>
                    </div>

                </div>
            </div>
            <div class="col-md-6 d-flex gap-3">
            <div class="row">
                <div class="col-6">
                    <div class="card card-custom rounded-2  ">

                        </div> -->

                                <h3 class="card-title">Total Number of Courses</h3>
                                <h5 class="card-text fs-4" id="numofCources">0</h5>
                                <button class="card-link w-50 rounded-3 btn-custom" data-bs-toggle="modal" data-bs-target="#viewCourseModal" id="viewCoursesbtn">View All</button>
                        </div>
                    </div>
                </div>
                <div class="col-6">
                <div class="card card-custom rounded-2 ">
                    <!-- <div class="card-header">

                    </div> -->
                    <div class="card-body d-flex flex-column gap-3">

                        <button class="card-link w-50 rounded-3 btn-custom" id="enrolledCoursesbtn">View All</button>
                    </div>
                </div>
                </div>

        </div>
        </div>

    <div class="container mt-5 m-auto mb-5 ">
        <div class="d-flex  flex-column gap-2 ">
                <h3>Avaiable Courses</h3>
            <!-- <div class="d-flex gap-2">
                <button class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#addCourseModal" >Add Course</button>
                <button class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#restoreCourseModal" id="restoreCoursesbtn" >Restore Course</button>
                <span><i class="fa-solid fa-filter "></i></span>

            <div>
               <button class="btn btn-custom " style="width: auto" id="AllCoursebtn" >All Course</button>
               <button class="btn btn-custom " style="width: auto" id="RecommendedCoursebtn" >Recommended Course</button>
            </div>
        </div>
        <div class="mt-4">
            <div class="row" id="CourseListContainer" >
                
            </div>
        </div>

    <div class="modal modal-lg" id="addCourseModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Add Course</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-cotent">
                    <div class="modal-body">
                        <label class="form-label fw-semibold ">Title</label>
                        <input class="form-control mb-3" type="text" placeholder="Enter Title of Course" id="addCourseTitle">
                        <label class="form-label fw-semibold">Duration(in months)</label>
                        <input class="form-control mb-3" placeholder="Enter Duration " type="number" id="addCourseDuration">
                        <!-- <label class="form-label fw-semibold">Department </label>
                        <select class="form-select mb-3" id="addCourseDepartment">
                            <option value=" ">Department</option>
                            <option value="IT">IT</option>
                            <option value="Finance">FINANCE</option>
                        </select> -->
                        <label class="form-label fw-semibold">Description</label>
                        <textarea class="form-control mb-3" rows="3" id="addCourseDesc"></textarea>
                        <div class="d-flex justify-content-end gap-3">
                            <button class="btn bg_col" id="addCoursebtn">Submit</button>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

        <div class="modal modal-lg" id="restoreCourseModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Restore Courses</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-cotent">
                    <div class="modal-body">
                        <div id="restoreCourseModalContainer" class="row g-4">

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal modal-lg" id="viewCourseModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Courses List</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-cotent">
                    <div class="modal-body">
                        <div id="viewCourseModalContainer" class="row g-4">

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal modal-lg" id="viewStudentModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Students List</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-cotent">
                    <div class="modal-body">
                        <div id="viewStudentModalContainer" class="row g-4">

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal modal-lg" id="editCourseModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Edit Course Details</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-cotent">
                    <div class="modal-body">
                        <label class="form-label fw-semibold ">Title</label>
                        <input class="form-control mb-3" type="text" placeholder="Enter Title of Course" id="editCourseTitle">
                        <label class="form-label fw-semibold">Duration(in months)</label>
                        <input class="form-control mb-3" placeholder="Enter Duration " type="number" id="editCourseDuration">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea class="form-control mb-3" rows="3" id="editCourseDesc"></textarea>
                        <div class="d-flex justify-content-end gap-3">
                            <button class="btn bg_col" id="editCoursebtn">Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
