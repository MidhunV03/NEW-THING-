<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoursePath</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/MentorDashboard.css">
</head>
<body class="body_col">

    <nav class="navbar navbar-expand-lg nav_bg_color sticky-top">
        <div class="navbar-brand text-light">
            <img src="../assets/learning.png" width="35px">
            <h4 class="d-inline">Course<span class="text-black">P</span>ath</h4>
        </div>
        <div class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav_items">
            <span class="navbar-toggler-icon"></span>
        </div>
        <div class="collapse navbar-collapse " id="nav_items">
            <div class="navbar-nav ms-auto ">
                <div class="nav-item">
                    <div class="nav-link">
                        <button class="btn border" id="theme_btn">🌙</button>
                    </div>
                </div>
                <div class="nav-item">
                    <div class="nav-link">
                        <button class="btn border text-light" data-bs-toggle="modal" data-bs-target="#loginmodal">HOME</button>
                    </div>
                </div>
                <!-- <div class="nav-item">
                    <div class="nav-link">
                        <button class="btn border text-light" data-bs-toggle="modal" data-bs-target="#signinmodal"></button>
                    </div>
                </div> -->
            </div>
        </div> 
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-4">
                <div class="card card-custom rounded-2">
                    <!-- <div class="card-header">
                        <h3>Number of Courses</h3>
                        <h4>0</h4>
                    </div> -->
                    <div class="card-body d-flex flex-column gap-3">
                            <h3 class="card-title">Number of Courses</h3>
                            <h5 class="card-text fs-4 ">0</h5>
                            <button class="card-link w-25 btn-custom">View All</button>
                    </div>
                    <div class="card--footer">
                        
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card card-custom rounded-2">
                    <!-- <div class="card-header">
                        <h3>Number of Courses</h3>
                        <h4>0</h4>
                    </div> -->
                    <div class="card-body d-flex flex-column gap-3">
                            <h3 class="card-title">Number of Students</h3>
                            <h5 class="card-text fs-4 ">0</h5>
                            <button class="card-link w-25 btn-custom">View All</button>
                    </div>
                    <div class="card--footer">
                        
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card card-custom rounded-2">
                    <!-- <div class="card-header">
                        <h3>Number of Courses</h3>
                        <h4>0</h4>
                    </div> -->
                    <div class="card-body d-flex flex-column gap-3">
                            <h3 class="card-title">Active Students</h3>
                            <h5 class="card-text fs-4 ">0</h5>
                            <button class="card-link w-25 btn-custom">View All</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5 m-auto mb-5">
        <div class="d-flex justify-content-between">
            <h3>Courses List</h3>
            <button class="btn btn-custom" data-bs-toggle="modal" data-bs-target="#addCourseModal" >Add Course</button>
        </div>
        <div class="mt-4">
            <div class="row" id="CourseListContainer" >
                
            </div>
        </div>
    </div>

    <div class="modal modal-lg" id="addCourseModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4>Add Course</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-cotent">
                    <div class="modal-body">
                        <label class="form-label fw-semibold ">Title</label>
                        <input class="form-control mb-3" type="text" placeholder="Enter Title of Course" id="addCourseTitle">
                        <label class="form-label fw-semibold">Duration(in months)</label>
                        <input class="form-control mb-3" placeholder="Enter Duration " type="number" id="addCourseDuration">
                        <label class="form-label fw-semibold">Department </label>
                        <select class="form-select mb-3" id="addCourseDepartment">
                            <option value=" ">Department</option>
                            <option value="IT">IT</option>
                            <option value="Finance">FINANCE</option>
                        </select>
                        <label class="form-label fw-semibold">Description</label>
                        <textarea class="form-control mb-3" rows="3" id="addCourseDesc"></textarea>
                        <div class="d-flex justify-content-end gap-3">
                            <button class="btn bg_col" id="addCoursebtn">Submit</button>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="../scripts/MentorDashboard.js"></script>
</body>
</html>
